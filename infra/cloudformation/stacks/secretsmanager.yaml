AWSTemplateFormatVersion: "2010-09-09"
Description: Secrets Manager resources for Medical Clinic Legal Validator

Parameters:
  Environment:
    Type: String
    Default: local
    AllowedValues: [local, prod]

Resources:
  AppSecrets:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: medical-validator/secrets
      Description: Application secrets — JWT signing key, API keys

Outputs:
  AppSecretsArn:
    Value: !Ref AppSecrets
  AppSecretsName:
    Value: medical-validator/secrets
