services:
  localstack:
    image: localstack/localstack:3
    ports:
      - "4566:4566"
    env_file:
      - .env
    environment:
      SERVICES: sqs,dynamodb,apigateway,iam,cloudformation,secretsmanager
      EAGER_SERVICE_LOADING: 1
    volumes:
      - ./infra/scripts/bootstrap.sh:/etc/localstack/init/ready.d/bootstrap.sh
      - ./infra/cloudformation:/opt/cloudformation
      - localstack_data:/var/lib/localstack
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4566/_localstack/health"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  ollama:
    profiles: ["gpu"]
    image: ollama/ollama:0.6.2
    ports:
      - "127.0.0.1:11434:11434"
    entrypoint: ["/bin/bash", "/scripts/ollama-init.sh"]
    restart: unless-stopped
    mem_limit: 4g
    volumes:
      - ollama_data:/root/.ollama
      - ./training/ollama-model:/models:ro
      - ./infra/scripts/ollama-init.sh:/scripts/ollama-init.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "ollama list | grep -q medical-validator"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 30s

volumes:
  localstack_data:
  ollama_data:
